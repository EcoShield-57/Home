<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up</title>

    <link rel="stylesheet" href="login_style.css">
</head>

<body>

    <div class="auth-card">

        <!-- ================= LOGIN FORM ================= -->
        <div class="box login" id="loginBox">

            <form onsubmit="login(event)">

                <h2>Welcome Back</h2>

                <input 
                    type="email"
                    id="email"
                    placeholder="Email"
                    autocomplete="username"
                    required
                >

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    autocomplete="current-password"
                    required
                >

                <button type="submit" class="btn">
                    Sign In
                </button>

                <p id="msg"></p>

                <p>
                    New here?
                    <a href="#" onclick="toggleForm()">
                        Create account
                    </a>
                </p>

            </form>

        </div>

        <!-- ================= SIGNUP FORM ================= -->
        <div class="box signup" id="signupBox" style="display: none;">

            <form onsubmit="signup(event)">

                <h2>Get Started</h2>

                <input
                    type="text"
                    id="fullname"
                    placeholder="Full Name"
                    autocomplete="name"
                    required
                >

                <input
                    type="email"
                    id="signupEmail"
                    placeholder="Email"
                    autocomplete="username"
                    required
                >

                <input
                    type="password"
                    id="signupPassword"
                    placeholder="Password"
                    autocomplete="new-password"
                    required
                >

                <button type="submit" class="btn">
                    Sign Up
                </button>

                <p>
                    Already have an account?
                    <a href="#" onclick="toggleForm()">
                        Sign in
                    </a>
                </p>

            </form>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
