<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Signup</title>

    <link rel="stylesheet" href="login_style.css">
</head>

<body>

    <div class="auth-card">

        <!-- LOGIN -->
        <div class="box" id="loginBox">

            <h2>Welcome Back</h2>

            <form id="loginForm">

                <input
                    type="email"
                    id="loginEmail"
                    placeholder="Email"
                    required
                >

                <input
                    type="password"
                    id="loginPassword"
                    placeholder="Password"
                    required
                >

                <button type="submit" class="btn">
                    Sign In
                </button>

            </form>

            <p id="msg"></p>

            <p>
                New here?
                <a href="#" id="createAccount">
                    Create account
                </a>
            </p>

        </div>

        <!-- SIGNUP -->
        <div
            class="box"
            id="signupBox"
            style="display: none;"
        >

            <h2>Create Account</h2>

            <form id="signupForm">

                <input
                    type="email"
                    id="signupEmail"
                    placeholder="Email"
                    required
                >

                <input
                    type="password"
                    id="signupPassword"
                    placeholder="Password"
                    required
                >

                <button type="submit" class="btn">
                    Sign Up
                </button>

            </form>

            <p>
                Already have an account?
                <a href="#" id="backLogin">
                    Sign In
                </a>
            </p>

        </div>

    </div>
<script>
console.log("JS Connected");
</script>
    <script src="script.js"></script>

</body>

</html>
